name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Timelapse \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO | tail -50
      - name: Unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Timelapse \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:TimelapseTests \
            CODE_SIGNING_ALLOWED=NO | tail -80
